project: "InnoMapCAD — GIS-SAPR Chrome Extension + FastAPI Backend"
branchName: "ralph/implement-gis-sapr"
description: >
  Chrome Extension (Manifest V3) injected into 4dinno.ru digital twin.
  Adds GIS layers (cadastral parcels, protection zones) as deck.gl overlays,
  interactive building placement from preset catalog, and instant validation
  (Turf.js client + Shapely server). Extension is a full React/TypeScript app.
  Backend is FastAPI + Shapely with in-memory GeoJSON data.

