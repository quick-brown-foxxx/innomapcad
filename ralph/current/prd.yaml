  - id: "US-006"
    title: "Research GeoJSON data sources for Innopolis"
    description: >
      As a developer, I want to research and evaluate available data sources
      to determine the best way to get real cadastral and protection zone
      GeoJSON data for the Innopolis territory.
    acceptanceCriteria:
      - "Document your findings in docs/1.INFO.DATA_ACQUISITION.md"
      - "Test NSPD API (nspd.gov.ru) accessibility: can we fetch cadastral data by bbox?"
      - "Test rosreestr2coord Python library: does it work for Innopolis coordinates?"
      - "Check if 4dinno.ru itself serves usable GeoJSON layers (GET /media/layers/*.geojson)"
      - "Check OpenStreetMap Overpass API for Innopolis buildings/landuse data"
      - "For each source: document URL, format, accessibility, data quality"
      - "Recommend approach: real NSPD data vs generated mock data vs mix"
      - "If NSPD unavailable: document fallback plan with realistic generated data"
      - "No code changes required — this is a research story"
    priority: 6
    passes: false
    notes: >
      See docs/1.INFO.DATA_SOURCES.md for detailed source analysis.
      Innopolis bbox approximately: lon 48.72-48.76, lat 55.74-55.76.
      NSPD may require Referer: https://nspd.gov.ru header.
      4dinno.ru API: GET /api/v2/layers/ru/layers/anonymous/ lists available layers.
      The 'territory' slug may have useful GeoJSON at /media/layers/territory.geojson.
      Use web search and web fetch tools for API testing.

  - id: "US-007"
    title: "Acquire and prepare GeoJSON data files"
    description: >
      As a developer, I want real or high-quality generated GeoJSON data files
      for cadastral parcels and protection zones around Innopolis.
    acceptanceCriteria:
      - "backend/data/cadastral.geojson: FeatureCollection with 5+ cadastral parcels"
      - "Each cadastral feature has properties: cadnum (cadastral number), area_m2, category, permitted_use"
      - "backend/data/protection_zones.geojson: FeatureCollection with 3+ protection zones"
      - "Protection zone types: gas_pipeline (50m buffer), power_line (25m buffer), water_protection (200m buffer)"
      - "Each zone feature has properties: zone_id, zone_type, description, buffer_m"
      - "All coordinates in WGS-84, centered around Innopolis (lon ~48.74, lat ~55.75)"
      - "Geometries are valid (no self-intersections, rings closed properly)"
      - "Data is realistic: parcels don't wildly overlap, zones follow linear features"
      - "If real NSPD data obtained: scripts/fetch_nspd_data.py with fetch + transform logic"
      - "If generated: scripts/generate_mock_data.py with Shapely-based generation"
      - "Data validated: `python -c 'import json; json.load(open(\"backend/data/cadastral.geojson\"))'` succeeds"
      - "Typecheck passes (if scripts written in Python)"
    priority: 7
    passes: false
    notes: >
      Use findings from US-006 to decide approach.
      If using NSPD: fetch via rosreestr2coord or direct API, transform to our schema.
      If generating: use Shapely to create realistic polygons.
      Parcels should form a grid-like pattern (typical for planned cities like Innopolis).
      Protection zones should cross some parcels (to make validation meaningful).
      Some parcels should be fully clear (to allow valid placement in tests).
      The extension/data/ may also need copies for offline/degraded mode.

