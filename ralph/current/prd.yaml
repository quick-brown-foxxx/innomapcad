    acceptanceCriteria:
      - "Page-context script (injected.ts) gets deck.gl instance via React fiber walk"
      - "Fiber walk: #deckgl-overlay → __reactFiber → walk up to ref.current.deck"
      - "TypeIs guard narrows the single any-point (fiber walk result) to typed DeckInstance"
      - "setProps patched to automatically include custom layers alongside existing ones"
      - "MutationObserver re-patches after React re-renders"
      - "Communication between content script and page script via CustomEvent or postMessage"
      - "Zustand store (deck-store.ts) tracks: deckReady, customLayers, patchedSetProps"
      - "Unit test for layer merging logic (pure function, no browser needed)"
      - "Typecheck passes"
    priority: 13
    passes: false
    notes: >
      The fiber walk is the single any-point in the extension. Use TypeIs guard
      to narrow immediately. See docs/1.INFO.CURRENT_MAP_ANALYSIS.md for DOM structure.
      Deck instance path: overlay[fiberKey].return.return.ref.current.deck.
      Communication pattern: page script dispatches CustomEvent on document,
      content script listens via window.addEventListener.

